<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Prompt-Bibliothek Admin</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="container">
    <header class="topbar">
      <div class="brand">Admin · Prompt-Bibliothek</div>
      <a href="/" class="badge">Öffentliche Ansicht</a>
    </header>

    <section id="loginCard" class="card">
      <h2>Login</h2>
      <p class="muted">Bitte Admin-Passwort eingeben.</p>
      <div class="controls">
        <input id="password" type="password" placeholder="Admin-Passwort" />
        <button id="loginBtn">Anmelden</button>
      </div>
      <p id="loginError" class="muted"></p>
    </section>

    <section id="adminPanel" class="card hidden">
      <div class="topbar">
        <h2>Prompts verwalten</h2>
        <button id="logoutBtn" class="ghost">Abmelden</button>
      </div>

      <div class="form-grid">
        <input id="nr" type="number" placeholder="Nr" />
        <input id="abk" placeholder="Abkürzung" />
        <textarea id="promptText" placeholder="Prompt"></textarea>
      </div>
      <div class="actions" style="margin-bottom:.8rem;">
        <button id="saveBtn">Speichern</button>
        <button id="cancelEditBtn" class="ghost hidden">Bearbeiten abbrechen</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead><tr><th>Nr</th><th>Abkürzung</th><th>Prompt</th><th>Aktionen</th></tr></thead>
          <tbody id="adminRows"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="/shared.js"></script>
  <script src="/admin.js"></script>
</body>
</html>
